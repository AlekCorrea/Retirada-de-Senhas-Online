name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies (backend)
        run: |
          cd backend
          npm ci

      - name: Build (backend)
        run: |
          cd backend
          npm run build --if-present

      - name: Test (backend)
        run: |
          cd backend
          npm test --if-present

  frontend:
    name: Frontend (Vue + Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (frontend)
        run: |
          cd frontend
          npm ci

      - name: Lint (frontend)
        run: |
          cd frontend
          npm run lint --if-present

      - name: Build (frontend)
        run: |
          cd frontend
          npm run build --if-present
