<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Teste Socket.IO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 24px; }
    h1 { color: #333; margin-bottom: 20px; }
    #status-bar {
      display: flex; align-items: center; gap: 10px;
      background: #fff; border-radius: 8px; padding: 12px 16px;
      margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    #dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
    #dot.conectado { background: #22c55e; }
    #dot.erro      { background: #ef4444; }
    #status-text { font-size: 14px; color: #555; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .card h2 { font-size: 15px; color: #444; margin-bottom: 12px; border-bottom: 2px solid #6366f1; padding-bottom: 6px; }
    #senha-chamada-box {
      font-size: 48px; font-weight: bold; color: #6366f1;
      text-align: center; padding: 16px 0; min-height: 80px;
      letter-spacing: 4px; transition: transform 0.15s;
    }
    #senha-tipo { text-align: center; font-size: 13px; color: #888; margin-top: -8px; }
    #log { list-style: none; max-height: 260px; overflow-y: auto; }
    #log li { font-size: 13px; padding: 6px 8px; border-radius: 4px; margin-bottom: 4px; display: flex; gap: 8px; }
    #log li.conectado { background: #dcfce7; color: #166534; }
    #log li.desconect { background: #fee2e2; color: #991b1b; }
    #log li.fila      { background: #ede9fe; color: #4c1d95; }
    #log li.chamada   { background: #fef3c7; color: #92400e; }
    #log li.erro      { background: #fee2e2; color: #991b1b; }
    .log-hora { opacity: 0.6; white-space: nowrap; }
    #btn-limpar { background: #6366f1; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
    #btn-limpar:hover { background: #4f46e5; }
    #contador { font-size: 13px; color: #888; margin-top: 8px; }
  </style>
</head>
<body>

<h1>🔌 Teste Socket.IO — Tempo Real</h1>

<div id="status-bar">
  <div id="dot"></div>
  <span id="status-text">Conectando...</span>
</div>

<div class="cards">
  <div class="card">
    <h2>📢 Última Senha Chamada</h2>
    <div id="senha-chamada-box">—</div>
    <div id="senha-tipo"></div>
  </div>
  <div class="card">
    <h2>📊 Eventos Recebidos</h2>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">
      <div>🔄 <strong>filaAtualizada:</strong> <span id="cnt-fila">0</span>x</div>
      <div>📣 <strong>senhaChamada:</strong> <span id="cnt-chamada">0</span>x</div>
      <div>✅ <strong>Conexões:</strong> <span id="cnt-connect">0</span>x</div>
    </div>
  </div>
</div>

<div class="card">
  <h2>📋 Log de Eventos &nbsp; <button id="btn-limpar" onclick="limparLog()">Limpar</button></h2>
  <ul id="log"></ul>
  <div id="contador">Nenhum evento ainda.</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("status-text");
  const log = document.getElementById("log");
  const contador = document.getElementById("contador");
  const senhaChamadaBox = document.getElementById("senha-chamada-box");
  const senhaTipo = document.getElementById("senha-tipo");

  let cntFila = 0, cntChamada = 0, cntConnect = 0, totalEventos = 0;

  function hora() { return new Date().toLocaleTimeString("pt-BR"); }

  function adicionarLog(mensagem, classe) {
    const li = document.createElement("li");
    li.className = classe;
    li.innerHTML = `<span class="log-hora">${hora()}</span> ${mensagem}`;
    log.insertBefore(li, log.firstChild);
    totalEventos++;
    contador.textContent = `Total de eventos: ${totalEventos}`;
  }

  function limparLog() {
    log.innerHTML = "";
    totalEventos = 0;
    contador.textContent = "Nenhum evento ainda.";
  }

  const socket = io();

  socket.on("connect", () => {
    dot.className = "conectado";
    statusText.textContent = `Conectado ✔  (ID: ${socket.id})`;
    cntConnect++;
    document.getElementById("cnt-connect").textContent = cntConnect;
    adicionarLog(`Conectado — ID: <strong>${socket.id}</strong>`, "conectado");
  });

  socket.on("disconnect", () => {
    dot.className = "erro";
    statusText.textContent = "Desconectado ✗";
    adicionarLog("Desconectado do servidor", "desconect");
  });

  socket.on("connect_error", (err) => {
    dot.className = "erro";
    statusText.textContent = "Erro de conexão ✗";
    adicionarLog(`Erro de conexão: ${err.message}`, "erro");
  });

  socket.on("filaAtualizada", () => {
    cntFila++;
    document.getElementById("cnt-fila").textContent = cntFila;
    adicionarLog("🔄 <strong>filaAtualizada</strong> — fila de senhas foi modificada", "fila");
  });

  socket.on("senhaChamada", (senha) => {
    cntChamada++;
    document.getElementById("cnt-chamada").textContent = cntChamada;
    const codigo = senha?.codigo ?? senha?.numero ?? JSON.stringify(senha);
    const tipo = senha?.tipo ?? "";
    senhaChamadaBox.textContent = codigo;
    senhaTipo.textContent = tipo ? `Tipo: ${tipo}` : "";
    senhaChamadaBox.style.transform = "scale(1.2)";
    setTimeout(() => senhaChamadaBox.style.transform = "scale(1)", 300);
    adicionarLog(`📣 <strong>senhaChamada</strong> — senha <strong>${codigo}</strong> ${tipo ? `(${tipo})` : ""}`, "chamada");
  });
</script>

</body>
</html>
