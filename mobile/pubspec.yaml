name: senhas_online
description: "Sistema de Senhas Online para Atendimento - Aplicativo Mobile"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP e Networking
  http: ^1.1.0
  dio: ^5.3.0
  
  # State Management
  provider: ^6.0.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  
  # Navigation
  go_router: ^11.0.0
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0
  
  # Authentication
  google_sign_in: ^6.1.0
  
  # Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
